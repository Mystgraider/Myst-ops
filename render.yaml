# NOTE: Render's own free Postgres auto-deletes after 30 days + a 14-day
# grace period - not acceptable for a CRM holding case data you care about.
# Use a permanent-free external Postgres instead (Neon.tech or Supabase both
# work, no card required, no expiry) and paste its connection details into
# the backend service's env vars in the Render dashboard after this Blueprint
# deploys (they're left as `sync: false` placeholders below on purpose).

services:
  - type: web
    name: ghost-crm-backend
    runtime: docker
    dockerContext: ./ghost/backend
    dockerfilePath: ./ghost/backend/Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_HOST
        sync: false   # paste your Neon/Supabase host here
      - key: DB_PORT
        value: 5432
      - key: DB_USER
        sync: false   # paste your Neon/Supabase user here
      - key: DB_PASSWORD
        sync: false   # paste your Neon/Supabase password here
      - key: DB_NAME
        sync: false   # paste your Neon/Supabase database name here
      - key: DB_SSL
        value: "true"  # Neon/Supabase require SSL; local docker-compose doesn't need this
      - key: SETUP_TOKEN
        generateValue: true  # Render generates a random value - check it in the Environment tab, use it once to create your admin user, then feel free to clear it
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: ghost-crm-frontend
          type: web
          property: host

  - type: web
    name: ghost-crm-frontend
    runtime: docker
    dockerContext: ./ghost/frontend
    dockerfilePath: ./ghost/frontend/Dockerfile
    plan: free
    envVars:
      # Free-tier web services can't receive private network traffic (Render
      # platform limit), so this goes over the public internet instead of
      # Render's private network. ghost-crm-backend.onrender.com is
      # deterministic from the backend service's name above - same hostname
      # you already used successfully from Postman to create the admin user.
      - key: BACKEND_HOST
        value: "ghost-crm-backend.onrender.com"
      - key: BACKEND_SCHEME
        value: "https"
