name: Docker Compose Smoke Test

# Verifies the full stack (frontend + backend + db) actually builds and
# boots correctly - specifically that the nginx envsubst templating change
# resolves BACKEND_HOST properly. Runs on every push so a broken change
# gets caught before you try to deploy it anywhere.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate test .env
        run: |
          printf "DB_PASSWORD=%s\nSESSION_SECRET=%s\nDB_USER=postgres\nDB_NAME=osint_crm_db\nDB_HOST=db\nDB_PORT=5432\nNODE_ENV=production\nPORT=3001\nFRONTEND_URL=http://localhost:8080\n" \
            "$(openssl rand -base64 24)" "$(openssl rand -base64 32)" > .env

      - name: Build and start stack
        run: docker compose up --build -d

      - name: Wait for backend health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health > /dev/null; then
              echo "Backend healthy after ${i}0s"
              break
            fi
            echo "Waiting for backend... (${i}/30)"
            sleep 10
          done
          curl -sf http://localhost:3001/api/health || (echo "::error::Backend never became healthy" && exit 1)

      - name: Verify frontend proxies /api to backend correctly
        # This is the actual test of the nginx envsubst fix: if BACKEND_HOST
        # didn't resolve, this request would fail or hang instead of getting
        # a proxied response from the backend's health endpoint.
        run: |
          curl -sf http://localhost:8080/api/health || (echo "::error::Frontend could not reach backend through nginx proxy - check BACKEND_HOST templating" && exit 1)
          echo "✅ Frontend successfully proxied /api to backend via BACKEND_HOST"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
