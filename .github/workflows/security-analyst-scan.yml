name: Security Analyst Scan

# Runs the scanner automatically when security-analyst or bogart's Python
# code changes, or manually anytime via the Actions tab.
on:
  push:
    branches: [main]
    paths: ["security-analyst/**", "bogart/**"]
  pull_request:
    branches: [main]
    paths: ["security-analyst/**", "bogart/**"]
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: security-analyst
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        # scans the whole repo checkout (".."), not just this subfolder -
        # that's what catches bogart_v6.py too. Change to "." to scan only
        # security-analyst's own source.
        run: python main.py scan .. --no-db

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.run_id }}
          path: security-analyst/output_reports/
          retention-days: 30
          if-no-files-found: warn
