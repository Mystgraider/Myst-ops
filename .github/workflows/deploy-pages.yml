name: Deploy Pages (hub + ThreatScanner + Dashboard)

on:
  push:
    branches: [main]
    paths: ["hub/**", "threatscanner/**", "dashboard/frontend/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble combined site
        # hub/ becomes the site root, threatscanner/ and dashboard/frontend/
        # become subpages - kept as separate source folders in git (no
        # duplicated files) and combined only at deploy time.
        run: |
          mkdir -p _site/threatscanner _site/dashboard
          cp hub/index.html _site/index.html
          cp threatscanner/index.html _site/threatscanner/index.html
          cp dashboard/frontend/index.html _site/dashboard/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload combined site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
